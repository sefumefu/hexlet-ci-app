name: hexlet-ci-app
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
         node-version: '24'
      - name: setup
        run: make setup
      - name: lint
        run: make lint
      - name: test
        run: make test
